	<script type="text/javascript">
		var unitConfig = [];
		var pricesDefinition = [];
		var unitCat = []
		var priceDefinitionLabels = {
			de: {
				"Cost Type": "Kostenart",
				"Costs": "Kosten",
				"Earnings": "Erträge",
				"Fixed price": "Festpreis",
				"Price source": "Preisquelle",
				"Price state": "Preis-Datenpunkt",
				"Price value": "Preis pro Einheit / Datenpunkt",
				"State value": "Datenpunkt"
			},
			en: {
				"Cost Type": "Cost type",
				"Costs": "Costs",
				"Earnings": "Earnings",
				"Fixed price": "Fixed price",
				"Price source": "Price source",
				"Price state": "Price state",
				"Price value": "Price per unit / state",
				"State value": "State value"
			}
		};
		const units = {
			"electricity": {
				"Watt": [
					{ "unit": "GW", "exponent": 9 },
					{ "unit": "MW", "exponent": 6 },
					{ "unit": "kW", "exponent": 3 },
					{ "unit": "W", "exponent": 0 },
					{ "unit": "mW", "exponent": -3 }
				],
				"Watt_hour": [
					{ "unit": "GWh", "exponent": 9 },
					{ "unit": "MWh", "exponent": 6 },
					{ "unit": "kWh", "exponent": 3 },
					{ "unit": "Wh", "exponent": 0 },
					{ "unit": "mWh", "exponent": -3 }
				]
			},
			"volume": {
				"Cubic_meter": [
					{ "unit": "km³", "exponent": 3 },
					{ "unit": "m³", "exponent": 0 },
					{ "unit": "dm³", "exponent": -1 },
					{ "unit": "cm³", "exponent": -2 },
					{ "unit": "mm³", "exponent": -3 }
				],
				"Liter": [
					{ "unit": "hl", "exponent": 2 },
					{ "unit": "l", "exponent": 0 },
					{ "unit": "dl", "exponent": -1 },
					{ "unit": "cl", "exponent": -2 },
					{ "unit": "ml", "exponent": -3 }
				]
			}
		};

		// Function to build dropdown menu
		function fillSelect(selector, data, unit) {
			$(selector).unbind('change');

			// let selectInstance = M.FormSelect.getInstance($(selector));
			// if (selectInstance) {
			// 	selectInstance.destroy();
			// }

			$(selector).empty();
			if (unit) {
				$(selector).append('<option value="" selected>' + _('automatically') + '</option>');
			} else {
				$(selector).append('<option value="" selected>' + _('Choose') + '</option>');

			}
			// console.log(`Selector ${selector} of data ${data}`)


			for (let d in data) {
				if (d !== 'remove' && d == 'undefined') {
					// console.log(`Data D ${d} of data ${data[d]}`)
					$(selector).append('<option value="' + data[d] + '">' + data[d] + '</option>');
				}
			}

			// instances = M.FormSelect.init($(selector));

			// $(selector).on('change', (evq		ent) => {
			// _onChange();
			// })
		}

		function translatePriceDefinitionText(text) {
			var lang = typeof systemLang !== 'undefined' && systemLang ? systemLang : 'en';
			if (priceDefinitionLabels[lang] && priceDefinitionLabels[lang][text]) {
				return priceDefinitionLabels[lang][text];
			}
			if (priceDefinitionLabels.en[text]) {
				return priceDefinitionLabels.en[text];
			}
			return typeof _ === 'function' ? _(text) : text;
		}

		function normalizePricesDefinitionRows(rows) {
			if (!Array.isArray(rows)) {
				return [];
			}

			for (var i = 0; i < rows.length; i++) {
				if (!rows[i]) {
					rows[i] = {};
				}
				rows[i].costType = rows[i].costType === 'earnings' ? 'earnings' : 'costs';
				rows[i].priceSource = rows[i].priceSource === 'state' ? 'state' : 'static';
				if (rows[i].priceState === undefined || rows[i].priceState === null) {
					rows[i].priceState = '';
				}
				if (rows[i].uPpU === undefined || rows[i].uPpU === null) {
					rows[i].uPpU = '';
				}
			}

			return rows;
		}

		function getPricesDefinitionCell($row, name) {
			var columnIndex = $('#pricesDefinition .table-values th[data-name="' + name + '"]').index();
			return columnIndex >= 0 ? $row.children('td').eq(columnIndex) : $();
		}

		function useNativePricesDefinitionSelects($container) {
			var $selects = $container.find('select');
			if (!$selects.length) {
				return;
			}

			$selects.each(function () {
				var $select = $(this);
				var value = $select.val();

				if (typeof M !== 'undefined' && M.FormSelect) {
					var instance = M.FormSelect.getInstance(this);
					if (instance) {
						instance.destroy();
					}
				}

				var $cell = $select.closest('td');
				var $wrapper = $select.parent('.select-wrapper');
				if ($wrapper.length) {
					$wrapper.before($select);
					$wrapper.remove();
				}
				$select.prev('.select-wrapper').remove();
				$select.next('.select-wrapper').remove();
				$cell.find('input.select-dropdown, ul.dropdown-content.select-dropdown, svg.caret').remove();

				$select
					.val(value)
					.addClass('browser-default sa-native-select')
					.removeClass('initialized')
					.css({
						display: 'block',
						opacity: 1,
						pointerEvents: 'auto',
						position: 'static'
					});
			});
		}

		function translatePricesDefinitionTable() {
			var selectLabels = {
				costType: {
					costs: 'Costs',
					earnings: 'Earnings'
				},
				priceSource: {
					static: 'Fixed price',
					state: 'State value'
				}
			};
			var headerLabels = {
				costType: 'Cost Type',
				priceSource: 'Price source',
				uPpU: 'Price value',
				priceState: 'Price state'
			};

			Object.keys(headerLabels).forEach(function (name) {
				$('#pricesDefinition .table-values th[data-name="' + name + '"]').text(translatePriceDefinitionText(headerLabels[name]));
			});

			Object.keys(selectLabels).forEach(function (name) {
				$('#pricesDefinition .values-input[data-name="' + name + '"] option').each(function () {
					var label = selectLabels[name][$(this).attr('value')];
					if (label) {
						$(this).text(translatePriceDefinitionText(label));
					}
				});
			});
		}

		function togglePriceDefinitionRow($row) {
			var isDynamicPrice = $row.find('.values-input[data-name="priceSource"]').val() === 'state';
			getPricesDefinitionCell($row, 'uPpU').toggleClass('sa-hidden-price-cell', isDynamicPrice);
			getPricesDefinitionCell($row, 'priceState').toggleClass('sa-hidden-price-cell', !isDynamicPrice);
		}

		function updatePricesDefinitionTable() {
			var $container = $('#pricesDefinition');
			translatePricesDefinitionTable();
			useNativePricesDefinitionSelects($container);
			$container.find('.values-input[data-name="priceState"]').parent('div').addClass('sa-oid-cell-content');

			$container.find('.table-lines tr').each(function () {
				togglePriceDefinitionRow($(this));
			});

			$container.find('.values-input[data-name="priceSource"]')
				.off('change.sourceanalytix')
				.on('change.sourceanalytix', function () {
					togglePriceDefinitionRow($(this).closest('tr'));
				});

			if (typeof M !== 'undefined') {
				M.updateTextFields('#pricesDefinition');
			}
		}

		function renderPricesDefinitionTable(onChange) {
			normalizePricesDefinitionRows(pricesDefinition);
			values2table('pricesDefinition', pricesDefinition, onChange, function () {
				updatePricesDefinitionTable();
			});
		}

		// This will be called by the admin adapter when the settings page loads
		function load(settings, onChange) {
			// example: select elements with id=key and class=value and insert value
			if (!settings) return;
			$('.value').each(function () {
				var $key = $(this);
				var id = $key.attr('id');
				if ($key.attr('type') === 'checkbox') {
					// do not call onChange direct, because onChange could expect some arguments
					$key.prop('checked', settings[id])
						.on('change', () => onChange())
						;
				} else {
					// do not call onChange direct, because onChange could expect some arguments
					$key.val(settings[id])
						.on('change', () => onChange())
						.on('keyup', () => onChange())
						;
				}
			});
			unitConfig = settings.unitConfig || [];
			pricesDefinition = normalizePricesDefinitionRows(settings.pricesDefinition || []);
			onChange(false);

			// Read values for drop down menu of unit configuration
			for (const cath in units) {
				for (const array in units[cath]) {
					for (const unit in units[cath][array]) {
						// console.log(`Unit found in array ${JSON.stringify(units[cath][array][unit].unit)}`);
						if (units[cath][array][unit].unit) {
							unitCat.push(units[cath][array][unit].unit)
						}
					}
				}
			}

			renderPricesDefinitionTable(onChange);
			// reinitialize all the Materialize labels on the page if you are dynamically adding inputs:
			if (typeof M !== 'undefined') M.updateTextFields();
		}

		// This will be called by the admin adapter when the user presses the save button
		function save(callback) {
			// example: select elements with class=value and build settings object
			var obj = {};
			$('.value').each(function () {
				var $this = $(this);
				if ($this.attr('type') === 'checkbox') {
					obj[$this.attr('id')] = $this.prop('checked');
				} else {
					obj[$this.attr('id')] = $this.val();
				}
			});
			obj.pricesDefinition = normalizePricesDefinitionRows(table2values('pricesDefinition'));

			callback(obj);
		}
	</script>

</head>
